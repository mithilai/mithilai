# Copy this file into your OTHER repo — the one named exactly "mithilai"
# (the profile-README repo, github.com/mithilai/mithilai) — not this portfolio repo.
# Path inside that repo: .github/workflows/snake.yml
#
# After it's added, GitHub Actions will run once a day (and on push) to generate
# an animated snake that "eats" your contribution graph, publish it to a branch
# named "output", and the <img> already added to mithilai.md points at that file.
# The very first run may take a minute or two to appear after it's merged.

name: generate animated snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: mithilai
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23F5A623

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
